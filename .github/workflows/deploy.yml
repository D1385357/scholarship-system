name: Deploy Vue to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ 取得程式碼
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ 設定 Node（Vite 必須 Node 20+）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 3️⃣ 安裝依賴（frontend）
      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # 4️⃣ 建置 Vue
      - name: Build project
        working-directory: frontend
        run: npm run build

      # 5️⃣ 防止 Jekyll 亂掃（超重要）
      - name: Add .nojekyll
        run: touch frontend/dist/.nojekyll

      # 6️⃣ 部署到 gh-pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/dist
